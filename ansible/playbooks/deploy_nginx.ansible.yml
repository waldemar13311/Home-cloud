- name: Deploy nginx
  hosts: nginx
  become: true

  vars:
    nginx_remove_default_vhost: true # Удаляем дефолтный конфиг
    nginx_listen_ipv6: false  # ОТКЛЮЧАЕТ IPv6

    # Настройка виртуальных хостов
    nginx_vhosts:
      # Блок для порта 80 (Редирект)
      - listen: "80"
        server_name: "nginx.home"
        filename: "nginx.home.80.conf"
        return: "301 https://nginx.home$request_uri"

      # Блок для порта 443 (SSL)
      - listen: "443 ssl"
        server_name: "nginx.home"
        filename: "nginx.home.443.conf"
        root: "/var/www/html"
        index: "index.nginx-debian.html"
        extra_parameters: |
          ssl_certificate     /etc/ssl/internal/nginx.home.crt;
          ssl_certificate_key /etc/ssl/internal/nginx.home.key;
          ssl_protocols       TLSv1.2 TLSv1.3;
          ssl_ciphers         HIGH:!aNULL:!MD5;

  roles:
    - geerlingguy.nginx
